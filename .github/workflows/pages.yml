name: Deploy IRONFORGE to GitHub Pages

# Déploie le site statique (PWA) sur GitHub Pages.
# PRÉREQUIS (une seule fois) : Settings → Pages → Source = "GitHub Actions".
# Tant que Pages n'est pas activé, ce workflow ne peut pas créer le site
# (le token CI n'en a pas le droit). On le lance donc à la main une fois Pages activé.
# En attendant, l'app est servie via CDN (jsDelivr/githack) — voir le README.
on:
  push:
    branches: [main]   # déploie automatiquement à chaque merge sur main (une fois Pages activé)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
