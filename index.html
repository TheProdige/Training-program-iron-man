<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0f1a" />
  <title>IRONFORGE</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="icons/icon.svg" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🔱 IRONFORGE</div>
    <div id="phase-pill" class="pill" title="Phase courante"></div>
  </header>

  <main id="app" class="app"><!-- vues injectées ici --></main>

  <nav class="tabbar" id="tabbar">
    <button data-route="today"   class="tab">🎯<span>Aujourd'hui</span></button>
    <button data-route="plan"    class="tab">🗺️<span>Plan</span></button>
    <button data-route="log"     class="tab">✍️<span>Logger</span></button>
    <button data-route="review"  class="tab">🔁<span>Revue</span></button>
    <button data-route="progress" class="tab">📈<span>Progrès</span></button>
    <button data-route="more"    class="tab">⋯<span>Plus</span></button>
  </nav>

  <script type="module" src="js/app.js"></script>
</body>
</html>
